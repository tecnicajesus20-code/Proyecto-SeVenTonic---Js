<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevenTonic</title>
   <link rel="stylesheet" href="css/Admin-categorias.css">
    <link rel="stylesheet" href="css/Admin-pages.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/WebComponents.css">
    <link rel="stylesheet" href="css/Admin-RegistroVentas.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/home-Usuario.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Be+Vietnam+Pro:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;700&family=Sora:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
        <header>
            <header-user></header-user>
        </header>
         

    <main class="main-layout">
       <section class="container">
         <articule class="hero-section">
                <h1 class="hero-title">
                    SUMÉRGETE EN EL <span class="gradient-text">RITMO</span>
                </h1>
                <p class="hero-subtitle">
                    Descubre los mejores Event, diseñados para ti. La energía del directo en la palma de tu mano.
                </p>
        </articule>
        <articule class="filters-section">
            <div class="glass-card filters-wrapper">
                <div class="">
                    <label class="filter-label">Cuándo</label>
                    <div class="filter-input-wrapper">
                        <span class="material-symbols-outlined ">calendar_today</span>
                        <select class="filter-select">
                            <option>Este fin de semana</option>
                            <option>Próxima semana</option>
                            <option>Este mes</option>
                            <option>Seleccionar rango...</option>
                        </select>
                        <span class="material-symbols-outlined ">expand_more</span>
                    </div>
                </div>
                <div class="">
                    <label class="filter-label">Dónde</label>
                    <div class="filter-input-wrapper">
                        <span class="material-symbols-outlined ">location_on</span>
                        <input class="filter-input" placeholder="Ciudad o recinto..." type="text">
                    </div>
                </div>
                <div class="">
                    <button class="btn-filter">
                        <span class="material-symbols-outlined">tune</span>
                        FILTRAR
                    </button>
                </div>
            </div>
        </articule>
        <section class="grid-section events-grid ">
             <article class="">
                <div class="event-card glass-card neon-glow-cyan">
                    <div class="card-image-wrapper">
                          <div class="card-image" ><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRY9YYHuzI57QF2xhT-EtGIcpbugSz4fh8E75S1-He6iA&s=10"></img></div>
                        <div class="absolute top-3 right-3">
                            <span class="badge-recommended">RECOMENDADO</span>
                        </div>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">Artist Artist</h3>
                        <p class="card-info">Próximo Evento: <span class="text-gray-300">Estadio</span></p>
                        <div class="card-footer">
                            <span class="card-tag"># ITTTECIA</span>
                            <span class="material-symbols-outlined arrow-icon">arrow_forward</span>
                        </div>
                    </div>
                </div>
            </article>
        </section>
       </section>

        
        <footer>
            <footer-admin></footer-admin>
        </footer>
    </main>
    
    
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script src="js/data-seed.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
