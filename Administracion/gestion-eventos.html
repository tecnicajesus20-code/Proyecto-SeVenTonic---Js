<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>
   <link rel="stylesheet" href="../css/Admin-categorias.css">
    <link rel="stylesheet" href="../css/Admin-pages.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/WebComponents.css">
    <link rel="stylesheet" href="../css/Admin-RegistroVentas.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/Admin-GestionEventos.css">
</head>

<body id="admin-eventos">
    <barra-lateral-admin></barra-lateral-admin>
    <main class="main-content">
        <header>
            <header-admin></header-admin>
        </header>


        <section>
            <h1>Gestión de eventos</h1>

            <article id="stats-container">
                <div>
                    <h5>Total de Eventos</h5>
                    <p id="total-eventos">--</p>
                </div>
                <div>
                    <h5>Total de Categorías</h5>
                    <p id="total-categorias">--</p>
                </div>
                <div>
                    <h5>Total de Ventas</h5>
                    <p id="total-ventas">--</p>
                </div>
            </article>
            <article>
                <div>

                    <span class="material-symbols-outlined">search</span>
                    <input type="search" id="search-input" placeholder="Buscar por artista o fecha..." />
                </div>
                <button id="btn-crear-evento" class="btn-primary">
                    <span class="material-symbols-outlined">add</span>
                    Crear evento
                </button>
            </article>

            <article>
                <div id="eventos-list">
                </div>
            </article>
        </section>
        <!-- ========================================= -->
        <!-- MODAL PARA CREAR / EDITAR EVENTOS        -->
        <!-- ========================================= -->
        <div id="modal-evento" class="modal-overlay" style="display:none;">
            <div class="modal-contenido">
        
                <span class="modal-cerrar" id="btn-cerrar-modal">&times;</span>
        
                <h2 id="modal-titulo">Nuevo Evento</h2>
        
                <form id="form-evento">
        
                    <input type="hidden" id="evento-id" name="id">
        
                    <label for="nombre">Nombre del evento *</label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        placeholder="Ej: Rock al Parque"
                        required
                    >
        
                    <label for="categoria">Categoría *</label>
                    <select
                        id="categoria"
                        name="categoria"
                        required>
                    </select>
        
                    <label for="precio">Precio (COP) *</label>
                    <input
                        type="number"
                        id="precio"
                        name="precio"
                        min="0"
                        required
                    >
        
                    <label for="fecha">Fecha *</label>
                    <input
                        type="date"
                        id="fecha"
                        name="fecha"
                        required
                    >
        
                    <label for="hora">Hora</label>
                    <input
                        type="time"
                        id="hora"
                        name="hora"
                        value="19:00"
                    >
        
                    <label for="ciudad">Ciudad *</label>
                    <select
                        id="ciudad"
                        name="ciudad"
                        required>
                    </select>
        
                    <label for="descripcion">Descripción / Artista</label>
                    <textarea
                        id="descripcion"
                        name="descripcion"
                        placeholder="Breve descripción del evento">
                    </textarea>
        
                    <label for="imagen">URL de la imagen</label>
                    <input
                        type="url"
                        id="imagen"
                        name="imagen"
                        placeholder="https://ejemplo.com/imagen.jpg"
                    >
        
                    <button
                        type="submit"
                        class="btn-primary"
                        id="btn-guardar-evento">
                        Guardar Evento
                    </button>
        
                </form>
        
            </div>
        </div>
        <footer>
            <footer-admin></footer-admin>
        </footer>
    </main>

    <!-- Scripts -->
    <script src="../js/modulos-admin/gestion-eventos.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/data-seed.js"></script>
    <script src="../js/main.js"></script>
</body>

</html>
