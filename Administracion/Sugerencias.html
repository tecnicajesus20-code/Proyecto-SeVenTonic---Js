<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Ventas</title>
    <link rel="stylesheet" href="../css/Admin-categorias.css">
    <link rel="stylesheet" href="../css/Admin-pages.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/WebComponents.css">
    <link rel="stylesheet" href="../css/Admin-RegistroVentas.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/Sugerencias.css">
</head>

<body id="admin-sugerenicas">
    <barra-lateral-admin></barra-lateral-admin>
    <main class="contenido-principal">
        <header>
            <header-admin></header-admin>
        </header>
        <section>
            <div class="page-content-ventas">
                <section>
                    <div class="metric-card card">
                        <div class="metric-icon">
                            <span class="material-symbols-outlined">receipt_long</span>
                        </div>
                        <div>
                            <p class="metric-label">sugerencias Totales</p>
                            <h3 class="metric-value" id="total-sugerencias">0</h3>
                        </div>
                    </div>
                </section>
                <section class="table-container">
                    <div class="table-header">
                        <h3 class="table-title">Sugerencias de Usuarios</h3>
                        <div class="table-controls">
                            <div class="search-box">
                                <span class="material-symbols-outlined search-icon">search</span>
                                <input type="text" id="buscador-sugerencias" placeholder="Buscar por cliente...">
                            </div>
                        </div>
                    </div>

                    <div class="table-wrapper">
                        <table class="sales-table">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>ID</th>
                                    <th>Cliente</th>
                                    <th>Correo</th>
                                    <th>Sugerencia</th>
                                    <th class="text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-suggestions">
                                <tr>
                                    <td colspan="6" class="text-center"
                                        style="padding: 40px; color: var(--sobre-superficie-variante);">
                                        Cargando...
                                    </td>
                                </tr>
                                
                            </tbody>
                        </table>
                    </div>

                </section>
            </div>
        </section>
        <footer>
            <footer-admin></footer-admin>
        </footer>
    </main>
    <script src="../js/modulos-admin/reporte-ventas.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/admin.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/data-seed.js"></script>
</body>

</html>
